name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      # Force the headless matplotlib backend: the smoke test reaches
      # Visualizer.plt.show(), which blocks forever on a GUI backend.
      MPLBACKEND: agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Type check (mypy)
        run: python -m mypy craps

      - name: Run tests (pytest)
        run: python -m pytest tests/ -q

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Run tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build
