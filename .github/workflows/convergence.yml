name: Convergence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  house-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MPLBACKEND: agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: House-edge convergence (~1M rolls per strategy)
        run: python -m pytest -m convergence -q
